<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Card Data Reports</title>
    <style>
      :root {
        --bg: #ffffff;
        --bg-card: #f6f8fa;
        --border: #d0d7de;
        --text: #1f2328;
        --text-muted: #656d76;
        --link: #0969da;
        --link-hover: #0550ae;
        --accent: #0969da;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --bg-card: #161b22;
          --border: #30363d;
          --text: #e6edf3;
          --text-muted: #8b949e;
          --link: #58a6ff;
          --link-hover: #79c0ff;
          --accent: #58a6ff;
        }
      }

      * { box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        margin: 0;
        padding: 2rem;
        max-width: 960px;
        margin: 0 auto;
        line-height: 1.6;
        color: var(--text);
        background-color: var(--bg);
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      h2 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-top: 2rem;
        margin-bottom: 1rem;
      }

      p { color: var(--text-muted); }

      .nav-select {
        padding: 6px 12px;
        font-size: 14px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background-color: var(--bg-card);
        color: var(--text);
        min-width: 200px;
        margin-bottom: 1.5rem;
      }

      .reports-list {
        list-style-type: none;
        padding: 0;
        display: grid;
        gap: 0.75rem;
      }

      .report-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 1rem 1.25rem;
        background-color: var(--bg-card);
        transition: border-color 0.15s;
      }

      .report-item:hover {
        border-color: var(--accent);
      }

      .report-item a {
        color: var(--link);
        font-weight: 600;
        text-decoration: none;
        font-size: 1rem;
      }

      .report-item a:hover {
        color: var(--link-hover);
        text-decoration: underline;
      }

      .report-description {
        color: var(--text-muted);
        margin: 0.25rem 0 0 0;
        font-size: 0.875rem;
      }

      .generation-info {
        margin-top: 3rem;
        color: var(--text-muted);
        font-size: 0.8rem;
        border-top: 1px solid var(--border);
        padding-top: 1rem;
      }

      .generation-info p { margin: 0; }
    </style>
  </head>
  <body>
    <main>
      <h1>MTG Card Data Reports</h1>

      <select class="nav-select" onchange="window.location.href=this.value">
        <option value="">Select a report...</option>
        {% for link in nav_links %}
        <option value="{{ link.url }}">{{ link.display_name }}</option>
        {% endfor %}
      </select>

      <p>
        Aggregated data reports generated from the Scryfall card database.
      </p>

      <h2>Reports</h2>
      <ul class="reports-list">
        {% for link in nav_links %}
        <li class="report-item">
          <a href="{{ link.url }}">{{ link.display_name }}</a>
          <p class="report-description">{{ link.description }}</p>
        </li>
        {% endfor %}
      </ul>

      <div class="generation-info">
        <p>Data from Scryfall as of {{ generation_date }}.</p>
      </div>
    </main>
  </body>
</html>
